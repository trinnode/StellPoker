version: '3.8'

x-json-logging: &json-logging
  logging:
    driver: json-file
    options:
      max-size: "100m"
      max-file: "3"

services:
  # Soroban local network (stellar quickstart)
  soroban:
    image: stellar/quickstart:latest
    command: --local --enable-soroban-rpc
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000"]
      interval: 5s
      timeout: 3s
      retries: 30
    <<: *json-logging

  # MPC Node 0
  mpc-node-0:
    build:
      context: .
      dockerfile: services/node/Dockerfile
    environment:
      NODE_ID: "0"
      PORT: "8101"
      MPC_PORT: "10000"
      PARTY_CONFIG: "/app/config/party_0.toml"
      CIRCUIT_DIR: "/app/circuits"
      CRS_DIR: "/app/crs"
      REQUEST_LOG_FORMAT: "json"
    ports:
      - "8101:8101"
      - "10000:10000"
    volumes:
      - ./crs:/app/crs
      - ./circuits:/app/circuits:ro
      - ./services/node/config:/app/config:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8101/health"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s
    <<: *json-logging

  # MPC Node 1
  mpc-node-1:
    build:
      context: .
      dockerfile: services/node/Dockerfile
    environment:
      NODE_ID: "1"
      PORT: "8102"
      MPC_PORT: "10001"
      PARTY_CONFIG: "/app/config/party_1.toml"
      CIRCUIT_DIR: "/app/circuits"
      CRS_DIR: "/app/crs"
      REQUEST_LOG_FORMAT: "json"
    ports:
      - "8102:8102"
      - "10001:10001"
    volumes:
      - ./crs:/app/crs
      - ./circuits:/app/circuits:ro
      - ./services/node/config:/app/config:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8102/health"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s
    <<: *json-logging

  # MPC Node 2
  mpc-node-2:
    build:
      context: .
      dockerfile: services/node/Dockerfile
    environment:
      NODE_ID: "2"
      PORT: "8103"
      MPC_PORT: "10002"
      PARTY_CONFIG: "/app/config/party_2.toml"
      CIRCUIT_DIR: "/app/circuits"
      CRS_DIR: "/app/crs"
      REQUEST_LOG_FORMAT: "json"
    ports:
      - "8103:8103"
      - "10002:10002"
    volumes:
      - ./crs:/app/crs
      - ./circuits:/app/circuits:ro
      - ./services/node/config:/app/config:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8103/health"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s
    <<: *json-logging

  # Coordinator (orchestrates MPC + serves API to web app)
  coordinator:
    build:
      context: .
      dockerfile: services/coordinator/Dockerfile
    env_file:
      - path: .env.local
        required: false
    environment:
      MPC_NODE_0: "http://mpc-node-0:8101"
      MPC_NODE_1: "http://mpc-node-1:8102"
      MPC_NODE_2: "http://mpc-node-2:8103"
      SOROBAN_RPC: "http://soroban:8000/soroban/rpc"
      CIRCUIT_DIR: "/app/circuits"
      CRS_DIR: "/app/crs"
      BIND_ADDR: "0.0.0.0:8080"
      REQUEST_LOG_FORMAT: "json"
    ports:
      - "8080:8080"
    volumes:
      - ./crs:/app/crs
      - ./circuits:/app/circuits:ro
    depends_on:
      soroban:
        condition: service_healthy
      mpc-node-0:
        condition: service_healthy
      mpc-node-1:
        condition: service_healthy
      mpc-node-2:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s
    <<: *json-logging

  # Web app
  # app is deployed on Vercel — run locally with: cd app && npm run dev
