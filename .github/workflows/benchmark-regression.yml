name: Benchmark Regression Detection

on:
  pull_request:
    paths:
      - '**/src/**'
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - '**/scripts/**'
      - '**/benchmark_data/**'

jobs:
  benchmark:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: actions/setup-rust@v2
        with:
          rust-version: stable

      - name: Install dependencies
        run: |
          rustup component add rustfmt
          rustup component add clippy

      - name: Run benchmarks
        id: run_bench
        env:
          CURRENT_RESULTS: ${{ runner.temp }}/bench_results.json
        run: |
          # Example benchmark command – replace with your actual command.
          # The command should output JSON with the required keys.
          cargo bench --quiet --manifest-path contracts/committee-registry/Cargo.toml \
            -- --output-format=json > ${{ env.CURRENT_RESULTS }}

      - name: Detect regression
        id: detect
        env:
          CURRENT_RESULTS: ${{ runner.temp }}/bench_results.json
          HISTORICAL_DIR: ${{ github.workspace }}/benchmark_data
          COMMENT_PAYLOAD: ${{ runner.temp }}/comment.json
        run: |
          python3 scripts/benchmark_check.py

      - name: Post comment on PR
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const comment = JSON.parse(fs.readFileSync(process.env.COMMENT_PAYLOAD, 'utf8'));
            github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: comment.body
            });
