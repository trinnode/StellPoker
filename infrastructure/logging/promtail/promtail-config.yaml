server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/positions/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 15s
        filters:
          - name: label
            values: ["com.docker.compose.project"]

    relabel_configs:
      # Use the container name as the service label.
      - source_labels: [__meta_docker_container_name]
        regex: /(.*)
        target_label: service

      # Keep the compose project for multi-project hosts.
      - source_labels: [__meta_docker_container_label_com_docker_compose_project]
        target_label: compose_project

      # Tag the compose service name separately from the full container name.
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: compose_service

      # Stream (stdout / stderr).
      - source_labels: [__meta_docker_container_log_stream]
        target_label: stream

    pipeline_stages:
      # Attempt to parse the line as JSON. For tracing-subscriber JSON output
      # the fields are: timestamp, level, fields.message, target, span, etc.
      - json:
          expressions:
            level: level
            message: fields.message
            target: target
            timestamp: timestamp
          drop_malformed: false

      # Promote the parsed level to a Loki label for fast filtering.
      - labels:
          level:
          target:

      # Use the log's own timestamp when present; fall back to scrape time.
      - timestamp:
          source: timestamp
          format: RFC3339Nano
          fallback_now: true
